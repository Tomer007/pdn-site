services:
  - type: web
    name: pdn-site
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && cp -r public .next/standalone/ && cp -r .next/static .next/standalone/.next/
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3003"
      - key: MESHULAM_PAGE_CODE
        sync: false
      - key: MESHULAM_API_KEY
        sync: false
